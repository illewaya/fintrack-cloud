services:
  - type: web
    name: fintrack-cloud
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_API_URL
        value: https://fintrack-cloud.onrender.com

  - type: pserv
    name: fintrack-db
    plan: free
    ipAllowList: []
    postgreSQLVersion: "15"
