name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PNPM_VERSION: 9.12.0
  NODE_VERSION: 18.x

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check
        continue-on-error: true

      - name: Build frontend
        run: pnpm build

      - name: Build backend
        run: pnpm build:server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_KEY: ${{ secrets.RENDER_DEPLOY_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_DEPLOY_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "⚠️  Render deployment skipped - secrets not configured"
            echo "Configure RENDER_DEPLOY_KEY and RENDER_SERVICE_ID in GitHub Secrets"
            exit 0
          fi
          
          echo "🚀 Triggering Render deployment..."
          curl -X POST "https://api.render.com/deploy/srv-$RENDER_SERVICE_ID?key=$RENDER_DEPLOY_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"full"}'

      - name: Verify deployment
        run: |
          echo "✅ Deployment triggered successfully"
          echo "Monitor progress at: https://dashboard.render.com"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment completed successfully!"
            echo "🌐 Your app is live at: https://fintrack-cloud.onrender.com"
          else
            echo "❌ Deployment failed"
            echo "Check GitHub Actions logs for details"
          fi
