name: Performance Monitoring

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

env:
  PNPM_VERSION: 9.12.0
  NODE_VERSION: 18.x

jobs:
  performance-check:
    name: Check Build Performance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Measure build time
        run: |
          echo "📊 Build Performance Report"
          echo "================================"
          
          START_TIME=$(date +%s)
          pnpm build
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo "Frontend build time: ${DURATION}s"
          
          START_TIME=$(date +%s)
          pnpm build:server
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          echo "Backend build time: ${DURATION}s"

      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Analysis"
          echo "================================"
          
          if [ -d "dist" ]; then
            echo "Total dist size:"
            du -sh dist/
            
            echo ""
            echo "Largest files:"
            find dist -type f -exec du -h {} + | sort -rh | head -10
          fi

      - name: Analyze dependencies
        run: |
          echo "📚 Dependency Analysis"
          echo "================================"
          
          echo "Production dependencies:"
          pnpm ls --depth=0 --prod
          
          echo ""
          echo "Dev dependencies:"
          pnpm ls --depth=0 --dev | head -20

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  memory-check:
    name: Memory Usage Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Check system resources
        run: |
          echo "💾 System Resources"
          echo "================================"
          
          echo "Available memory:"
          free -h
          
          echo ""
          echo "Disk usage:"
          df -h
          
          echo ""
          echo "Node.js version:"
          node --version
          
          echo ""
          echo "pnpm version:"
          pnpm --version

      - name: Install and measure
        run: |
          echo "📊 Installation metrics"
          /usr/bin/time -v pnpm install --frozen-lockfile 2>&1 | grep -E "Maximum resident set size|Elapsed"
